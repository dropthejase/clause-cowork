<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Graph Mode</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; background: #fff; color: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; }
      .container { width: 100%; max-width: 420px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
      h2 { font-size: 15px; font-weight: 600; }
      p { font-size: 12px; color: #666; line-height: 1.5; }
      .btn { font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; }
      .btn-primary { background: #c0714a; color: #fff; }
      .btn-secondary { background: #f5f0eb; color: #333; border: 1px solid #ddd; }
      .drop-zone { border: 2px dashed #ddd; border-radius: 8px; padding: 32px 16px; text-align: center; cursor: pointer; color: #888; font-size: 12px; transition: border-color 0.15s; }
      .drop-zone:hover, .drop-zone.over { border-color: #c0714a; color: #c0714a; }
      .error { color: #b91c1c; font-size: 11px; }
      .actions { display: flex; gap: 8px; justify-content: flex-end; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/dialog.ts"></script>
  </body>
</html>
